{% extends 'base.html' %}
{% block title %}Влез в акаунта си | Задачко{% endblock %}
{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}
{% block content %}
<div class="container section-padding">
    <div class="row g-4 align-items-center">
        <!-- Left Column - Benefits -->
        <div class="col-lg-6">
            <h1 class="fw-bold mb-4" style="font-size: 2.5rem;">Добре дошли отново! </h1>
            <div class="feature-list">
                <div class="feature-item d-flex gap-3 mb-4">
                    <div class="icon-box">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold">Реален успех</h5>
                    </div>
                </div>
                <div class="feature-item d-flex gap-3 mb-4">
                    <div class="icon-box">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold">Сигурност</h5>
                    </div>
                </div>
                <div class="feature-item d-flex gap-3 mb-4">
                    <div class="icon-box">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div>
                        <h5 class="fw-bold">Лесно при ползване</h5>
                    </div>
                </div>
            </div>
        </div>
        <!-- Right Column - Login Form -->
        <div class="col-lg-6">
            <div class="card glass shadow-heavy">
                <div class="card-body p-5">
                    <h3 class="mb-4 text-center fw-bold">Влез в акаунта си</h3>
                    <form method="POST" action="/login">
                        <div class="mb-4">
                            <label for="email" class="form-label">Имейл адрес</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email"
                                placeholder="you@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Парола</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password"
                                placeholder="••••••••" required>
                        </div>
                        <div class="form-check mb-4">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember">
                                Запомни ме
                            </label>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">Влез в акаунта си</button>
                        </div>
                        <div class="text-center">
                            <p class="text-muted mb-0">Нямаш акаунт? <a href="/signup"
                                    class="fw-bold text-decoration-none" style="color: #ffd166;">Създай акаунт</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
